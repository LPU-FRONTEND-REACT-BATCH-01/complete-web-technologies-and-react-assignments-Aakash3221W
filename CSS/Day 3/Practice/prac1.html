<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body{
        margin-bottom: 1000px;
        }
        .container{
            background-color: aquamarine;
            position: relative;
            height: 500px;
            width: 500px;
            padding: 20px;
        }
        .items{
            width: 100px;
            height: 100px;
            background-color: rgb(223, 79, 79);
            position: absolute;
            border: 4px solid black;
            border-radius: 30px;
            padding: 40px;
        }
        .item1{
            top: 40px;
            left: 40px;
        }
        .item2{
            position: sticky;
            top: 40px;
        }
        .item3{
            position: fixed;
            bottom: 10px ;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="items item1">item 1</div>
        <div class="items item2">item 2</div>
        <div class="items item3">item 3</div>
    </div>
</body>
</html>
