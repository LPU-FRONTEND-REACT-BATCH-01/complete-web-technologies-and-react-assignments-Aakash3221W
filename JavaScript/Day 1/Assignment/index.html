<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script>
        function calculateDistcountedPrice(price) {
            let discount;
            if (price > 6000) {
                discount = 25; 
            } else if (price > 2000) {
                discount = 15; 
            }
            return discount;
        }
        let price = Number(prompt("Enter the price of the product:"));
        let discountedPrice = calculateDistcountedPrice(price);
        if (discountedPrice !== undefined) {
            alert(`The discounted price is: ${discountedPrice}%`);
        } else {
            alert("No discount applicable.");
        }

    </script>
</head>

</body>
</html>
